name: Deploy Backend (Render)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    name: Lint & Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build
        working-directory: backend
        run: npm run build

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -d '{}'

      - name: Wait and verify health
        run: |
          echo "Attente 60s pour le démarrage..."
          sleep 60
          STATUS=$(curl -sf "${{ secrets.BACKEND_URL }}/api/health/ping" | jq -r '.status' 2>/dev/null || echo "error")
          if [ "$STATUS" = "ok" ]; then
            echo "✅ Backend health check OK"
          else
            echo "❌ Backend health check échoué"
            exit 1
          fi
