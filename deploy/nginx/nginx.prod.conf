# ================================================================
# Nginx — Configuration Production
# Remplacer audit.votre-domaine.com par votre vrai domaine
# ================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs structurés
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    # Optimisations
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length    1024;
    server_tokens      off;

    # Rate limiting global
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Upstream
    upstream backend  { server backend:3001;  keepalive 32; }
    upstream frontend { server frontend:3000; keepalive 32; }

    # ─── Redirect HTTP → HTTPS ──────────────────────────────────
    server {
        listen 80;
        server_name audit.votre-domaine.com www.audit.votre-domaine.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Principal ────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name audit.votre-domaine.com www.audit.votre-domaine.com;

        # Certificats Let's Encrypt (générés par certbot)
        ssl_certificate     /etc/letsencrypt/live/audit.votre-domaine.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/audit.votre-domaine.com/privkey.pem;

        # SSL moderne
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # Headers sécurité
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Taille max upload (documents)
        client_max_body_size 20M;

        # ─── API Backend /api/* ──────────────────────────────────
        location /api/ {
            # Rate limiting endpoints auth (plus strict)
            location /api/auth/login  { limit_req zone=auth_limit burst=3 nodelay; proxy_pass http://backend; }
            location /api/auth/       { limit_req zone=auth_limit burst=5 nodelay; proxy_pass http://backend; }

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ─── Frontend Next.js ────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Assets statiques Next.js (cache agressif) ───────────
        location /_next/static/ {
            proxy_pass http://frontend;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ─── Health check (sans auth) ────────────────────────────
        location /api/health {
            proxy_pass http://backend;
            access_log off;
        }
    }
}
