version: '3.9'

# ================================================================
# PRODUCTION — docker-compose
# Usage :
#   cp .env.prod .env
#   docker-compose -f deploy/docker-compose.prod.yml up -d
# ================================================================

services:

  # ─────────── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: audit_postgres_prod
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NE PAS exposer le port 5432 en prod (accessible uniquement en interne)
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - audit_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────── NestJS Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audit_backend_prod
    restart: always
    environment:
      NODE_ENV:                production
      PORT:                    3001
      DATABASE_URL:            postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=10&pool_timeout=20
      JWT_SECRET:              ${JWT_SECRET}
      JWT_REFRESH_SECRET:      ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:          ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN:  ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL:            ${FRONTEND_URL}
      SMTP_HOST:               ${SMTP_HOST}
      SMTP_PORT:               ${SMTP_PORT:-587}
      SMTP_USER:               ${SMTP_USER}
      SMTP_PASS:               ${SMTP_PASS}
      SMTP_FROM:               ${SMTP_FROM}
      UPLOAD_DIR:              /app/uploads
      THROTTLE_TTL:            60
      THROTTLE_LIMIT:          100
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - audit_internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─────────── Next.js Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: audit_frontend_prod
    restart: always
    environment:
      NODE_ENV:               production
      NEXT_PUBLIC_API_URL:    ${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - audit_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────── Nginx Reverse Proxy + SSL ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: audit_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - audit_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────── Backup automatique PostgreSQL ─────────────────────
  postgres-backup:
    image: postgres:16-alpine
    container_name: audit_backup
    restart: always
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      BACKUP_SCHEDULE:   "0 2 * * *"   # 2h du matin chaque jour
    volumes:
      - backups_data:/backups
      - ./deploy/scripts/backup-db.sh:/backup.sh:ro
    entrypoint: ["sh", "-c", "chmod +x /backup.sh && crond -f -l 8"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - audit_internal

volumes:
  postgres_data:
  uploads_data:
  backups_data:
  nginx_cache:

networks:
  audit_internal:
    driver: bridge
    internal: false
